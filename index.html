<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Plan">
<title>Golf Performance Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d5a27;
    --green-mid: #3e7a36;
    --green-light: #5a9e50;
    --cream: #f5f0e8;
    --sand: #e8dfc8;
    --bark: #8b6f4e;
    --charcoal: #1a1a1a;
    --muted: #6b7a6b;
    --white: #fdfcf8;
    --accent: #c4a35a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
color: var(–charcoal);
min-height: 100vh;
min-height: -webkit-fill-available;
overscroll-behavior: none;
}

/* ── VIEWS ── */
.view { display: none; min-height: 100vh; }
.view.active { display: block; }

/* ══════════════════════════════
HOME / WEEK VIEW
══════════════════════════════ */
#home {
display: none;
flex-direction: column;
}
#home.active { display: flex; }

.home-header {
background: var(–green);
padding: calc(var(–safe-top) + 20px) 20px 24px;
position: relative;
overflow: hidden;
}

.home-header::after {
content: ‘’;
position: absolute;
bottom: -30px; left: -10px; right: -10px;
height: 60px;
background: var(–cream);
border-radius: 50% 50% 0 0 / 60px 60px 0 0;
}

.home-eyebrow {
font-size: 9px;
letter-spacing: 0.28em;
text-transform: uppercase;
color: rgba(245,240,232,0.55);
margin-bottom: 4px;
}

.home-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 44px;
color: var(–cream);
line-height: 0.95;
}

.home-title span { color: var(–accent); }

.week-selector {
display: flex;
align-items: center;
gap: 12px;
margin-top: 16px;
position: relative;
z-index: 2;
}

.week-arrow {
background: rgba(255,255,255,0.12);
border: none;
color: var(–cream);
width: 34px; height: 34px;
border-radius: 50%;
font-size: 16px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background 0.15s;
flex-shrink: 0;
}
.week-arrow:active { background: rgba(255,255,255,0.25); }

.week-label {
flex: 1;
text-align: center;
}

.week-label-main {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
color: var(–cream);
letter-spacing: 0.05em;
display: block;
}

.week-label-date {
font-size: 11px;
color: rgba(245,240,232,0.6);
font-weight: 300;
display: block;
margin-top: 1px;
}

.current-week-badge {
background: var(–accent);
color: var(–charcoal);
font-size: 9px;
font-weight: 500;
letter-spacing: 0.15em;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 3px;
display: block;
text-align: center;
margin-top: 4px;
}

/* Weekly grid */
.week-grid {
padding: 36px 16px 16px;
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 6px;
}

.week-day-cell {
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
cursor: pointer;
}

.wdc-abbr {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–muted);
}

.wdc-ring {
width: 42px; height: 42px;
border-radius: 50%;
border: 2px solid rgba(45,90,39,0.15);
display: flex; align-items: center; justify-content: center;
position: relative;
transition: all 0.2s;
background: var(–white);
}

.wdc-inner {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
color: var(–green);
line-height: 1;
}

.week-day-cell.complete .wdc-ring {
background: var(–green);
border-color: var(–green);
}
.week-day-cell.complete .wdc-inner { color: var(–cream); }

.week-day-cell.partial .wdc-ring {
border-color: var(–accent);
background: rgba(196,163,90,0.1);
}

.week-day-cell.rest .wdc-ring {
background: var(–sand);
border-color: transparent;
}
.week-day-cell.rest .wdc-inner { color: var(–muted); font-size: 18px; }

.wdc-pct {
font-size: 9px;
color: var(–muted);
font-weight: 300;
}
.week-day-cell.complete .wdc-pct { color: var(–green-light); }

/* Week summary */
.week-summary {
margin: 0 16px 16px;
background: var(–white);
border: 1.5px solid rgba(45,90,39,0.1);
border-radius: 10px;
padding: 16px 18px;
}

.ws-label {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
}

.ws-bar-bg {
height: 8px;
background: rgba(45,90,39,0.1);
border-radius: 100px;
overflow: hidden;
margin-bottom: 8px;
}

.ws-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–green-light), var(–accent));
border-radius: 100px;
transition: width 0.5s ease;
}

.ws-stats {
display: flex;
justify-content: space-between;
font-size: 12px;
color: var(–muted);
}

.ws-stat-val {
font-weight: 500;
color: var(–green);
}

/* History section */
.history-section {
padding: 8px 16px calc(var(–safe-bottom) + 80px);
}

.hs-label {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
padding-left: 2px;
}

.history-row {
background: var(–white);
border: 1.5px solid rgba(45,90,39,0.08);
border-radius: 8px;
padding: 12px 14px;
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 6px;
cursor: pointer;
transition: border-color 0.15s;
}
.history-row:active { border-color: var(–green-light); }

.hr-week {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
color: var(–green);
min-width: 52px;
}

.hr-dates {
font-size: 11px;
color: var(–muted);
font-weight: 300;
flex: 1;
}

.hr-dots {
display: flex;
gap: 3px;
}

.hr-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: rgba(45,90,39,0.12);
}
.hr-dot.done { background: var(–green-light); }
.hr-dot.partial { background: var(–accent); }
.hr-dot.rest { background: var(–sand); border: 1px solid var(–bark); opacity: 0.5; }

.hr-pct {
font-size: 12px;
font-weight: 500;
color: var(–green);
min-width: 32px;
text-align: right;
}

/* No history */
.no-history {
text-align: center;
padding: 24px;
font-size: 13px;
color: var(–muted);
font-style: italic;
font-weight: 300;
}

/* ══════════════════════════════
DAY VIEW
══════════════════════════════ */
#dayview {
display: none;
flex-direction: column;
min-height: 100vh;
}
#dayview.active { display: flex; }

.day-topbar {
background: var(–green);
padding: calc(var(–safe-top) + 14px) 16px 18px;
display: flex;
align-items: flex-start;
gap: 12px;
position: sticky;
top: 0;
z-index: 10;
}

.back-btn {
background: rgba(255,255,255,0.12);
border: none;
color: var(–cream);
width: 36px; height: 36px;
border-radius: 50%;
font-size: 18px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
margin-top: 2px;
}
.back-btn:active { background: rgba(255,255,255,0.25); }

.day-topbar-text { flex: 1; }

.day-topbar-week {
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: rgba(245,240,232,0.5);
margin-bottom: 2px;
}

.day-topbar-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 30px;
color: var(–cream);
line-height: 1;
}

.day-topbar-sub {
font-size: 11px;
color: rgba(245,240,232,0.65);
font-weight: 300;
margin-top: 2px;
}

.day-topbar-badge {
background: rgba(255,255,255,0.12);
border-radius: 4px;
padding: 5px 10px;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–cream);
flex-shrink: 0;
text-align: center;
line-height: 1.4;
}

/* Day body */
.day-body {
flex: 1;
padding: 20px 16px calc(var(–safe-bottom) + 80px);
overflow-y: auto;
}

/* Progress strip */
.progress-strip {
background: var(–sand);
border-radius: 8px;
padding: 12px 16px;
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 12px;
}

.ps-label {
font-size: 10px;
font-weight: 500;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
white-space: nowrap;
min-width: 72px;
}

.ps-bar-bg {
flex: 1;
height: 6px;
background: rgba(45,90,39,0.15);
border-radius: 100px;
overflow: hidden;
}

.ps-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–green-light), var(–accent));
border-radius: 100px;
transition: width 0.3s ease;
}

.ps-count {
font-size: 12px;
font-weight: 500;
color: var(–green);
white-space: nowrap;
}

/* Section */
.section { margin-bottom: 22px; }

.section-label {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
padding-bottom: 7px;
border-bottom: 1px solid rgba(45,90,39,0.1);
display: flex;
align-items: center;
gap: 7px;
}

/* Exercise items */
.exercise-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
gap: 7px;
}

.exercise-item {
background: var(–white);
border: 1.5px solid rgba(45,90,39,0.1);
border-radius: 8px;
padding: 11px 13px;
display: flex;
align-items: flex-start;
gap: 9px;
cursor: pointer;
transition: all 0.15s ease;
user-select: none;
-webkit-user-select: none;
}
.exercise-item:active { opacity: 0.8; }

.exercise-item.done {
background: rgba(45,90,39,0.05);
border-color: var(–green-light);
}

.exercise-check {
width: 18px; height: 18px;
border-radius: 50%;
border: 2px solid rgba(45,90,39,0.2);
flex-shrink: 0;
margin-top: 1px;
display: flex; align-items: center; justify-content: center;
font-size: 10px;
color: transparent;
transition: all 0.15s;
}

.exercise-item.done .exercise-check {
background: var(–green-light);
border-color: var(–green-light);
color: white;
}

.exercise-name {
font-size: 13px;
font-weight: 500;
color: var(–charcoal);
line-height: 1.3;
}

.exercise-item.done .exercise-name {
color: var(–muted);
text-decoration: line-through;
text-decoration-color: rgba(90,158,80,0.5);
}

.exercise-sets {
font-size: 11px;
color: var(–muted);
margin-top: 2px;
font-weight: 300;
}

.reset-btn {
background: none;
border: none;
font-size: 11px;
color: var(–muted);
cursor: pointer;
text-decoration: underline;
font-family: inherit;
padding: 6px 0 0;
}

/* Focus block */
.focus-block {
background: var(–green);
border-radius: 8px;
padding: 18px 20px;
color: var(–cream);
position: relative;
overflow: hidden;
}
.focus-block::before {
content: ‘⛳’;
position: absolute;
right: 16px; top: 50%;
transform: translateY(-50%);
font-size: 44px;
opacity: 0.12;
}
.focus-clubs {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 30px;
color: var(–accent);
line-height: 1;
margin-bottom: 4px;
}
.focus-goal {
font-size: 12px;
color: rgba(245,240,232,0.7);
font-weight: 300;
font-style: italic;
margin-bottom: 8px;
}
.focus-items {
list-style: none;
display: flex;
flex-wrap: wrap;
gap: 5px;
margin-top: 8px;
}
.focus-items li {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.14);
border-radius: 4px;
padding: 3px 9px;
font-size: 11px;
color: var(–cream);
}

/* Speed block */
.speed-block {
background: var(–sand);
border: 1.5px solid rgba(139,111,78,0.2);
border-radius: 8px;
padding: 16px 18px;
position: relative;
overflow: hidden;
margin-bottom: 10px;
}
.speed-block::before {
content: ‘💨’;
position: absolute;
right: 14px; top: 50%;
transform: translateY(-50%);
font-size: 36px;
opacity: 0.2;
}
.speed-title {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–bark);
margin-bottom: 9px;
}
.speed-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.speed-list li {
font-size: 13px;
color: var(–charcoal);
display: flex;
align-items: center;
gap: 8px;
}
.speed-list li::before {
content: ‘’;
width: 18px; height: 2px;
background: var(–accent);
flex-shrink: 0;
}

/* Options + goal */
.options-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
gap: 7px;
margin-bottom: 14px;
}
.option-chip {
background: var(–white);
border: 1.5px solid rgba(45,90,39,0.1);
border-radius: 7px;
padding: 10px 13px;
font-size: 12px;
color: var(–charcoal);
display: flex;
align-items: center;
gap: 7px;
}
.option-chip::before { content: ‘◦’; color: var(–green-light); font-size: 16px; }

.goal-callout {
background: rgba(196,163,90,0.12);
border: 1.5px solid rgba(196,163,90,0.3);
border-radius: 7px;
padding: 13px 16px;
display: flex;
align-items: center;
gap: 11px;
}
.goal-icon { font-size: 18px; }
.goal-text { font-size: 13px; color: var(–charcoal); font-style: italic; font-weight: 300; }
.goal-text strong { font-style: normal; font-weight: 500; color: var(–bark); }

.divider { height: 1px; background: rgba(45,90,39,0.08); margin: 16px 0; }

/* ══════════════════════════════
BOTTOM NAV
══════════════════════════════ */
.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
background: var(–white);
border-top: 1px solid rgba(45,90,39,0.1);
display: flex;
padding-bottom: var(–safe-bottom);
z-index: 100;
display: none;
}
.bottom-nav.visible { display: flex; }

.bnav-item {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
padding: 10px 0 6px;
cursor: pointer;
border: none;
background: none;
font-family: inherit;
transition: opacity 0.15s;
}
.bnav-item:active { opacity: 0.6; }

.bnav-icon { font-size: 20px; margin-bottom: 2px; }
.bnav-label {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–muted);
}
.bnav-item.active .bnav-label { color: var(–green); }

/* Day tab strip */
.day-tab-strip {
display: flex;
gap: 5px;
overflow-x: auto;
padding: 0 16px 16px;
scrollbar-width: none;
}
.day-tab-strip::-webkit-scrollbar { display: none; }

.day-tab {
flex-shrink: 0;
background: var(–white);
border: 1.5px solid rgba(45,90,39,0.12);
border-radius: 6px;
padding: 7px 12px;
cursor: pointer;
text-align: center;
transition: all 0.15s;
font-family: inherit;
}
.day-tab-abbr {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
color: var(–green);
display: block;
line-height: 1;
}
.day-tab-sub {
font-size: 8px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–muted);
display: block;
margin-top: 2px;
}
.day-tab.active {
background: var(–green);
border-color: var(–green);
}
.day-tab.active .day-tab-abbr,
.day-tab.active .day-tab-sub { color: var(–cream); }

/* Complete banner */
.complete-banner {
background: var(–green);
color: var(–cream);
text-align: center;
padding: 10px;
font-size: 13px;
font-weight: 500;
letter-spacing: 0.05em;
display: none;
}
.complete-banner.show { display: block; }

</style>
</head>
<body>

<!-- ════════ HOME VIEW ════════ -->

<div id="home" class="view active">
  <div class="home-header">
    <div class="home-eyebrow">Weekly Training Protocol</div>
    <div class="home-title">Golf<br><span>Performance</span></div>
    <div class="week-selector">
      <button class="week-arrow" onclick="changeWeek(-1)">‹</button>
      <div class="week-label">
        <span class="week-label-main" id="weekLabel">WEEK 1</span>
        <span class="week-label-date" id="weekDates"></span>
        <span class="current-week-badge" id="currentBadge" style="display:none">Current Week</span>
      </div>
      <button class="week-arrow" onclick="changeWeek(1)">›</button>
    </div>
  </div>

  <!-- Weekly dot grid -->

  <div class="week-grid" id="weekGrid"></div>

  <!-- Week summary bar -->

  <div class="week-summary">
    <div class="ws-label">Week Completion</div>
    <div class="ws-bar-bg"><div class="ws-bar-fill" id="weekFill" style="width:0%"></div></div>
    <div class="ws-stats">
      <span>Workouts: <span class="ws-stat-val" id="wkWorkouts">0/5</span></span>
      <span>Sessions: <span class="ws-stat-val" id="wkSessions">0/5</span></span>
      <span><span class="ws-stat-val" id="wkPct">0%</span> done</span>
    </div>
  </div>

  <!-- History -->

  <div class="history-section">
    <div class="hs-label">History</div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ════════ DAY VIEW ════════ -->

<div id="dayview" class="view">
  <div class="day-topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="day-topbar-text">
      <div class="day-topbar-week" id="dv-week"></div>
      <div class="day-topbar-name" id="dv-name"></div>
      <div class="day-topbar-sub" id="dv-sub"></div>
    </div>
    <div class="day-topbar-badge" id="dv-badge"></div>
  </div>

  <!-- Day tab strip -->

  <div class="day-tab-strip" id="dayTabStrip"></div>

  <div class="complete-banner" id="completeBanner">🏌️ Day Complete!</div>

  <div class="day-body" id="dayBody"></div>
</div>

<!-- Bottom Nav -->

<div class="bottom-nav visible" id="bottomNav">
  <button class="bnav-item active" onclick="showView('home')">
    <span class="bnav-icon">📅</span>
    <span class="bnav-label">Overview</span>
  </button>
  <button class="bnav-item" onclick="goToToday()">
    <span class="bnav-icon">⛳</span>
    <span class="bnav-label">Today</span>
  </button>
</div>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
// weekOffset: 0 = current week, -1 = last week, 1 = next week, etc.
// startDate: Monday of week 1 (anchored from first app use)
// storage key: 'golfplan_v1'
// data shape: { startISO: string, weeks: { [weekNum]: { [dayIdx]: [bool...] } } }

let state = { startISO: null, weeks: {} };
let currentWeekOffset = 0;
let viewingWeek = 0; // absolute week number from start
let currentDayIdx = 0;

const KEY = 'golfplan_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  if (!state.startISO) {
    // Anchor to the Monday of the current week
    const mon = getMondayOf(new Date());
    state.startISO = mon.toISOString();
    saveState();
  }
}

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getStartDate() { return new Date(state.startISO); }

function getWeekNum(date) {
  // Returns week number relative to startDate (0-based)
  const start = getStartDate();
  const diff = getMondayOf(date) - start;
  return Math.round(diff / (7 * 86400000));
}

function getCurrentWeekNum() { return getWeekNum(new Date()); }

function getWeekStartDate(weekNum) {
  const start = getStartDate();
  const d = new Date(start);
  d.setDate(d.getDate() + weekNum * 7);
  return d;
}

function formatDateRange(weekNum) {
  const mon = getWeekStartDate(weekNum);
  const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  const opts = { month:'short', day:'numeric' };
  return mon.toLocaleDateString('en-US', opts) + ' – ' + sun.toLocaleDateString('en-US', opts);
}

function getDayState(weekNum, dayIdx) {
  const wk = state.weeks[weekNum];
  if (!wk || !wk[dayIdx]) return [];
  return wk[dayIdx];
}

function setExerciseState(weekNum, dayIdx, exIdx, val) {
  if (!state.weeks[weekNum]) state.weeks[weekNum] = {};
  const day = DAYS[dayIdx];
  const count = day.exercises ? day.exercises.length : 0;
  if (!state.weeks[weekNum][dayIdx]) {
    state.weeks[weekNum][dayIdx] = new Array(count).fill(false);
  }
  state.weeks[weekNum][dayIdx][exIdx] = val;
  saveState();
}

function resetDay(weekNum, dayIdx) {
  if (!state.weeks[weekNum]) return;
  const count = DAYS[dayIdx].exercises ? DAYS[dayIdx].exercises.length : 0;
  state.weeks[weekNum][dayIdx] = new Array(count).fill(false);
  saveState();
}

function getDayCompletion(weekNum, dayIdx) {
  const day = DAYS[dayIdx];
  if (day.isRest) return { type:'rest', pct:100 };
  const total = day.exercises.length;
  const done = getDayState(weekNum, dayIdx).filter(Boolean).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  if (pct === 100) return { type:'complete', pct:100, done, total };
  if (pct > 0) return { type:'partial', pct, done, total };
  return { type:'none', pct:0, done:0, total };
}

function getWeekCompletion(weekNum) {
  let totalEx = 0, doneEx = 0;
  for (let i = 0; i < 5; i++) { // Mon–Fri only
    const day = DAYS[i];
    totalEx += day.exercises.length;
    doneEx += getDayState(weekNum, i).filter(Boolean).length;
  }
  const pct = totalEx ? Math.round(doneEx / totalEx * 100) : 0;
  const workoutsComplete = [0,1,2,3,4].filter(i => getDayCompletion(weekNum,i).type==='complete').length;
  return { pct, workoutsComplete };
}

// ══════════════════════════════════════════════
// HOME VIEW
// ══════════════════════════════════════════════
function renderHome() {
  const cwn = getCurrentWeekNum();
  const wn = cwn + currentWeekOffset;
  viewingWeek = wn;

  // Header
  document.getElementById('weekLabel').textContent = 'WEEK ' + (wn + 1);
  document.getElementById('weekDates').textContent = formatDateRange(wn);
  const badge = document.getElementById('currentBadge');
  badge.style.display = currentWeekOffset === 0 ? 'block' : 'none';

  // Arrow: disable going to future if no data
  // (allow freely for now)

  // Grid
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  DAYS.forEach((day, i) => {
    const comp = getDayCompletion(wn, i);
    const cell = document.createElement('div');
    cell.className = 'week-day-cell ' + comp.type;
    let innerLabel = day.abbr.slice(0,2);
    let pctLabel = comp.pct > 0 ? comp.pct + '%' : '';
    if (day.isRest) { innerLabel = '★'; pctLabel = 'rest'; }
    cell.innerHTML = `
      <span class="wdc-abbr">${day.abbr.slice(0,1)}</span>
      <div class="wdc-ring"><span class="wdc-inner">${innerLabel}</span></div>
      <span class="wdc-pct">${pctLabel}</span>
    `;
    cell.onclick = () => openDay(wn, i);
    grid.appendChild(cell);
  });

  // Summary
  const wc = getWeekCompletion(wn);
  document.getElementById('weekFill').style.width = wc.pct + '%';
  document.getElementById('wkWorkouts').textContent = wc.workoutsComplete + '/5';
  document.getElementById('wkPct').textContent = wc.pct + '%';

  // History
  renderHistory(wn);
}

function renderHistory(currentWn) {
  const list = document.getElementById('historyList');
  list.innerHTML = '';

  // Collect all weeks that have data, sorted descending
  const weekNums = Object.keys(state.weeks).map(Number).sort((a,b)=>b-a);

  if (weekNums.length === 0) {
    list.innerHTML = '<div class="no-history">No history yet — start training!</div>';
    return;
  }

  weekNums.forEach(wn => {
    const wc = getWeekCompletion(wn);
    const row = document.createElement('div');
    row.className = 'history-row';
    const dots = DAYS.map((d,i) => {
      const c = getDayCompletion(wn,i);
      return `<div class="hr-dot ${c.type}"></div>`;
    }).join('');
    const label = wn === getCurrentWeekNum() ? 'Current' : 'Week ' + (wn+1);
    row.innerHTML = `
      <div class="hr-week">W${wn+1}</div>
      <div class="hr-dates"><div style="font-weight:500;font-size:12px;color:var(--charcoal)">${label}</div>${formatDateRange(wn)}</div>
      <div class="hr-dots">${dots}</div>
      <div class="hr-pct">${wc.pct}%</div>
    `;
    row.onclick = () => {
      currentWeekOffset = wn - getCurrentWeekNum();
      renderHome();
    };
    list.appendChild(row);
  });
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderHome();
}

// ══════════════════════════════════════════════
// DAY VIEW
// ══════════════════════════════════════════════
function openDay(weekNum, dayIdx) {
  viewingWeek = weekNum;
  currentDayIdx = dayIdx;
  renderDayView();
  document.getElementById('home').classList.remove('active');
  document.getElementById('dayview').classList.add('active');
  updateNavActive(1);
}

function goHome() {
  document.getElementById('dayview').classList.remove('active');
  document.getElementById('home').classList.add('active');
  updateNavActive(0);
  renderHome();
}

function updateNavActive(idx) {
  document.querySelectorAll('.bnav-item').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function renderDayView() {
  const day = DAYS[currentDayIdx];
  const wn = viewingWeek;

  document.getElementById('dv-week').textContent = 'WEEK ' + (wn+1) + ' · ' + formatDateRange(wn);
  document.getElementById('dv-name').textContent = day.name;
  document.getElementById('dv-sub').textContent = day.sub;
  document.getElementById('dv-badge').textContent = day.badge;

  // Tab strip
  const strip = document.getElementById('dayTabStrip');
  strip.innerHTML = '';
  DAYS.forEach((d, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i === currentDayIdx ? ' active' : '');
    tab.innerHTML = `<span class="day-tab-abbr">${d.abbr.slice(0,3)}</span><span class="day-tab-sub">${d.abbr.slice(0,3)}</span>`;
    tab.onclick = () => { currentDayIdx = i; renderDayView(); };
    strip.appendChild(tab);
  });

  // Body
  const body = document.getElementById('dayBody');
  body.innerHTML = '';

  if (day.isRest) {
    // Sat / Sun
    document.getElementById('completeBanner').classList.remove('show');
    const optGrid = document.createElement('div');
    optGrid.className = 'options-grid';
    day.options.forEach(o => {
      const chip = document.createElement('div');
      chip.className = 'option-chip';
      chip.textContent = o;
      optGrid.appendChild(chip);
    });
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `<div class="section-label">🏌️ Session Options</div>`;
    div.appendChild(optGrid);
    body.appendChild(div);

    const divider = document.createElement('div');
    divider.className = 'divider';
    body.appendChild(divider);

    const goal = document.createElement('div');
    goal.className = 'goal-callout';
    goal.innerHTML = `<div class="goal-icon">${day.goal.icon}</div><div class="goal-text">${day.goal.text}</div>`;
    body.appendChild(goal);
    return;
  }

  // Progress strip
  const progress = document.createElement('div');
  progress.className = 'progress-strip';
  progress.innerHTML = `
    <div class="ps-label">Activation</div>
    <div class="ps-bar-bg"><div class="ps-bar-fill" id="ps-fill" style="width:0%"></div></div>
    <div class="ps-count" id="ps-count">0 / ${day.exercises.length}</div>
  `;
  body.appendChild(progress);

  // Exercises section
  const exSection = document.createElement('div');
  exSection.className = 'section';
  exSection.innerHTML = `<div class="section-label">🏋️ Activation Exercises</div>`;
  const grid = document.createElement('div');
  grid.className = 'exercise-grid';
  grid.id = 'ex-grid';

  const saved = getDayState(wn, currentDayIdx);

  day.exercises.forEach((ex, i) => {
    const item = document.createElement('div');
    item.className = 'exercise-item' + (saved[i] ? ' done' : '');
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="exercise-check">✓</div>
      <div>
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-sets">${ex.sets}</div>
      </div>
    `;
    item.onclick = () => {
      item.classList.toggle('done');
      const isDone = item.classList.contains('done');
      setExerciseState(wn, currentDayIdx, i, isDone);
      updateProgress();
    };
    grid.appendChild(item);
  });

  exSection.appendChild(grid);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = 'reset';
  resetBtn.onclick = () => {
    resetDay(wn, currentDayIdx);
    grid.querySelectorAll('.exercise-item').forEach(el => el.classList.remove('done'));
    updateProgress();
  };
  exSection.appendChild(resetBtn);
  body.appendChild(exSection);

  updateProgress();

  // Speed section (Tue, Fri)
  if (day.speed) {
    const speedSec = document.createElement('div');
    speedSec.className = 'section';
    speedSec.innerHTML = `<div class="section-label">💨 Speed Training</div>`;
    const sb = document.createElement('div');
    sb.className = 'speed-block';
    sb.innerHTML = `<div class="speed-title">Speed Drills — Do First</div>
      <ul class="speed-list">${day.speed.map(s=>`<li>${s}</li>`).join('')}</ul>`;
    speedSec.appendChild(sb);
    body.appendChild(speedSec);
  }

  // Range section
  const rangeSec = document.createElement('div');
  rangeSec.className = 'section';
  rangeSec.innerHTML = `<div class="section-label">⛳ Simulator / Range</div>`;
  const fb = document.createElement('div');
  fb.className = 'focus-block';
  fb.innerHTML = `
    <div class="focus-clubs">${day.range.clubs}</div>
    <div class="focus-goal">${day.range.goal}</div>
    ${day.range.items.length ? '<ul class="focus-items">' + day.range.items.map(r=>`<li>${r}</li>`).join('') + '</ul>' : ''}
  `;
  rangeSec.appendChild(fb);
  body.appendChild(rangeSec);
}

function updateProgress() {
  const fill = document.getElementById('ps-fill');
  const count = document.getElementById('ps-count');
  const banner = document.getElementById('completeBanner');
  if (!fill) return;
  const items = document.querySelectorAll('#ex-grid .exercise-item');
  const done = document.querySelectorAll('#ex-grid .exercise-item.done').length;
  const total = items.length;
  const pct = total ? Math.round(done/total*100) : 0;
  fill.style.width = pct + '%';
  count.textContent = done + ' / ' + total;
  banner.classList.toggle('show', done === total && total > 0);
}

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
function showView(id) {
  if (id === 'home') goHome();
}

function goToToday() {
  const cwn = getCurrentWeekNum();
  currentWeekOffset = 0;
  // Figure out today's day index (Mon=0 … Sun=6)
  const today = new Date().getDay(); // 0=Sun,1=Mon,...
  const dayIdx = today === 0 ? 6 : today - 1;
  openDay(cwn, dayIdx);
}

// INIT
// ══════════════════════════════════════════════
loadState();
renderHome();
</script>
